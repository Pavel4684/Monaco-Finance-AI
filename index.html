function genHistory(cur,avg,days){
  const data=[];let p=avg*(1+(Math.random()-0.4)*0.15);
  const trend=(cur-p)/days;
  for(let i=0;i<days;i++){
    p=p+trend+p*(Math.random()-0.48)*0.025;
    p=Math.max(p,cur*0.05);
    const d=new Date();d.setDate(d.getDate()-(days-i));
    const label=days<=7?d.toLocaleDateString("fr-FR",{weekday:"short"}):days<=31?d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):d.toLocaleDateString("fr-FR",{month:"short",year:"2-digit"});
    data.push({date:label,price:parseFloat(p.toFixed(3))});
  }
  data[data.length-1].price=cur;return data;
}
